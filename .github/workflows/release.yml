name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to package, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Validate requested tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        shell: bash
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}" >/dev/null

      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Validate tag matches package version
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          if not release_tag.startswith("v"):
              raise SystemExit(f"release tag must start with 'v': {release_tag}")

          package = tomllib.loads(Path("Cargo.toml").read_text())
          version = package["package"]["version"]
          expected = f"v{version}"
          if release_tag != expected:
              raise SystemExit(
                  f"release tag {release_tag!r} does not match package version {expected!r}"
              )
          PY

      - name: Validate release notes
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: ./scripts/check-release-readiness.py "${RELEASE_TAG}"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install coverage tooling
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run fast checks
        run: ./scripts/check-rust-fast.sh

      - name: Run root package checks
        run: |
          cargo check --all-features --locked
          cargo clippy --all-features --all-targets -- -D warnings
          cargo test --all-features --locked
          cargo publish --dry-run --locked

      - name: Run workspace compatibility tests
        run: cargo test --manifest-path workspace/Cargo.toml --workspace --all-features --locked

      - name: Enforce coverage gate
        run: ./scripts/check-coverage-gate.py

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            bin_name: osp
          - runner: macos-latest
            triple: x86_64-apple-darwin
            bin_name: osp
          - runner: windows-latest
            triple: x86_64-pc-windows-msvc
            bin_name: osp.exe
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
          TARGET_TRIPLE: ${{ matrix.triple }}
          BIN_NAME: ${{ matrix.bin_name }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_base="osp-${RELEASE_TAG}-${TARGET_TRIPLE}"
          stage_dir="dist/${artifact_base}"
          mkdir -p "${stage_dir}"
          cp "target/release/${BIN_NAME}" "${stage_dir}/"
          cp README.md LICENSE "${stage_dir}/"
          archive_path="dist/${artifact_base}.tar.gz"
          tar -C dist -czf "${archive_path}" "${artifact_base}"
          export ARCHIVE_PATH="${archive_path}"
          python3 - <<'PY'
          import os
          import hashlib
          from pathlib import Path
          archive = Path(os.environ["ARCHIVE_PATH"])
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          Path(f"{archive}.sha256").write_text(f"{digest}  {archive.name}\n")
          PY

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
          TARGET_TRIPLE: ${{ matrix.triple }}
          BIN_NAME: ${{ matrix.bin_name }}
        shell: pwsh
        run: |
          $artifactBase = "osp-$env:RELEASE_TAG-$env:TARGET_TRIPLE"
          $stageDir = Join-Path "dist" $artifactBase
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null
          Copy-Item "target/release/$env:BIN_NAME" $stageDir
          Copy-Item "README.md" $stageDir
          Copy-Item "LICENSE" $stageDir
          $archivePath = Join-Path "dist" "$artifactBase.zip"
          Compress-Archive -Path "$stageDir/*" -DestinationPath $archivePath -Force
          $pythonScript = @'
          import os
          import hashlib
          from pathlib import Path
          archive = Path(os.environ["ARCHIVE_PATH"])
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          Path(f"{archive}.sha256").write_text(f"{digest}  {archive.name}\n")
          '@
          $env:ARCHIVE_PATH = $archivePath
          python -c $pythonScript

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.triple }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    environment: crates-io-release
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.tag }}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check crates.io publish state
        id: crates_io_state
        shell: bash
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          package = tomllib.loads(Path("Cargo.toml").read_text())["package"]
          name = package["name"]
          version = package["version"]
          url = f"https://crates.io/api/v1/crates/{name}/{version}"
          try:
              with urllib.request.urlopen(url) as response:
                  published = response.status == 200
          except urllib.error.HTTPError as err:
              if err.code == 404:
                  published = False
              else:
                  raise

          print(f"name={name}")
          print(f"version={version}")
          print(f"published={'true' if published else 'false'}")
          PY

      - name: Authenticate with crates.io
        if: steps.crates_io_state.outputs.published != 'true'
        id: crates_io_auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate to crates.io
        if: steps.crates_io_state.outputs.published != 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}
        run: cargo publish --locked

      - name: Skip crates.io publish because version already exists
        if: steps.crates_io_state.outputs.published == 'true'
        run: |
          echo "${{ steps.crates_io_state.outputs.name }} ${{ steps.crates_io_state.outputs.version }} is already published on crates.io; skipping publish."

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Copy release notes into publish bundle
        env:
          RELEASE_TAG: ${{ steps.release_tag.outputs.value }}
        run: cp "docs/releases/${RELEASE_TAG}.md" release-assets/release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          body_path: release-assets/release-notes.md
          files: release-assets/*
          overwrite_files: true
