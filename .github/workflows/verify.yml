name: Verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install coverage tooling
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run fast checks
        run: ./scripts/check-rust-fast.sh

      - name: Run workspace tests
        run: cargo test --workspace --all-features --locked

      - name: Run foundation candidate checks
        run: |
          cargo check --manifest-path foundation/Cargo.toml --all-features --locked
          cargo clippy --manifest-path foundation/Cargo.toml --all-features --all-targets -- -D warnings
          cargo test --manifest-path foundation/Cargo.toml --all-features --locked

      - name: Enforce coverage gate
        run: ./scripts/check-coverage-gate.py
